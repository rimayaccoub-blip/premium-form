<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>استمارة القبول — Premium ريما يعقوب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:#f5f0e8;color:#1c1c1c;direction:rtl}
  :root{--gold:#b8926a;--dark:#1c1c1c;--light:#f9f7f4;--cream:#ede8e1;--green:#4a9d5f;--orange:#f0ad4e;--red:#d64545;--border:#e5dfd6}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:10px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:1em;font-weight:700;transition:all .2s}
  .btn-gold{background:linear-gradient(135deg,#b8926a,#8b6f4f);color:#fff}
  .btn-gold:hover{opacity:.9;transform:translateY(-1px)}
  .btn-dark{background:#2c2c2c;color:#fff}
  .btn-dark:hover{background:#444}
  .btn-outline{background:transparent;border:2px solid var(--gold);color:var(--gold)}
  .card{background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .section-title{font-size:1.15em;font-weight:800;color:var(--dark);margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--cream);display:flex;align-items:center;gap:8px}
  .field{margin-bottom:18px}
  .field label{display:block;font-weight:600;font-size:.95em;margin-bottom:7px;color:#444}
  .field input,.field select,.field textarea{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.95em;color:#1c1c1c;background:#fafafa;transition:border .2s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);background:#fff}
  .field textarea{min-height:90px;resize:vertical}
  .field select{cursor:pointer}
  .options-grid{display:grid;gap:10px}
  .options-grid.cols-2{grid-template-columns:1fr 1fr}
  .options-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  .option-item{padding:12px 16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;font-size:.92em;display:flex;align-items:center;gap:10px;background:#fafafa}
  .option-item:hover{border-color:var(--gold);background:#fdf9f5}
  .option-item.selected{border-color:var(--gold);background:#fdf0e0;font-weight:700}
  .option-item input[type=checkbox],.option-item input[type=radio]{accent-color:var(--gold);width:16px;height:16px;flex-shrink:0}
  .progress-bar{height:6px;background:#e5dfd6;border-radius:6px;overflow:hidden;margin-bottom:20px}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#c77e5a);border-radius:6px;transition:width .4s ease}
  .score-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-weight:700;font-size:.9em}
  .score-high{background:#e8f5e9;color:var(--green)}
  .score-mid{background:#fff8e1;color:var(--orange)}
  .score-low{background:#fdecea;color:var(--red)}
  .stat-card{background:#fff;border-radius:12px;padding:22px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
  .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4em}
  .lead-card{background:#fff;border-radius:12px;padding:24px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);border-right:6px solid transparent}
  .lead-card.high{border-right-color:var(--green)}
  .lead-card.mid{border-right-color:var(--orange)}
  .lead-card.low{border-right-color:var(--red)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:600px){.field-row,.options-grid.cols-2,.options-grid.cols-3{grid-template-columns:1fr}}
  .disqualified-box{background:#fdecea;border:2px solid var(--red);border-radius:12px;padding:20px;text-align:center;margin-top:10px}
  .success-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .admin-bar{background:linear-gradient(135deg,#2c2c2c,#1a1a1a);color:#fff;border-radius:16px;padding:28px 32px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
  .empty-state{text-align:center;padding:60px 20px;color:#999}
  .empty-state .icon{font-size:3em;margin-bottom:16px;opacity:.3}
  input[type=text],input[type=email],input[type=tel]{direction:rtl}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = 'rima_premium_leads_v1';

// ─── SCORING ───────────────────────────────────────────────────────────────
function calcScore(d) {
  let s = 0;
  const income = {'أكثر من 50,000 ₪':30,'30,000–50,000 ₪':25,'15,000–30,000 ₪':20,'7,000–15,000 ₪':10,'أقل من 7,000 ₪':0};
  const exp    = {'أكثر من 3 سنوات':20,'1–3 سنوات':15,'6 أشهر – سنة':8,'أقل من 6 أشهر':3};
  const budget = {'أكثر من 20,000 ₪':30,'12,000–20,000 ₪':25,'7,000–12,000 ₪':15,'أريد أن أفهم القيمة أولاً':10,'أقل من 7,000 ₪':0};
  const time   = {'أكثر من 10 ساعات':10,'5–10 ساعات':8,'3–5 ساعات':5,'أقل من 3 ساعات':2};
  const commit = {'جاهزة 100% للاستثمار والالتزام':10,'مستعدة لكن أحتاج بعض التهيئة':7,'لا زلت في مرحلة الاستكشاف':3,'أبحث عن حل مجاني أو رخيص':0};
  s += income[d.monthlyIncome]  || 0;
  s += exp[d.experience]        || 0;
  s += budget[d.investmentBudget] || 0;
  s += time[d.weeklyTime]       || 0;
  s += commit[d.commitment]     || 0;
  return s;
}

function scoreClass(n){ return n >= 70 ? 'high' : n >= 50 ? 'mid' : 'low'; }
function scoreLabel(n){ return n >= 70 ? '✅ مرشحة ممتازة' : n >= 50 ? '🟡 مرشحة متوسطة' : '🔴 غير مناسبة حالياً'; }

// ─── EXPORT CSV ─────────────────────────────────────────────────────────────
function exportCSV(rows) {
  const headers = ['التاريخ','النتيجة','مستوى','الاسم','الإيميل','الهاتف','الموقع','نوع العمل','الخبرة','الدخل الشهري','نظام محاسبة','هامش الربح','ميزانية تطوير','الهدف المالي','التحديات','العوائق','تجربة تدريب سابقة','وقت أسبوعي','مستوى الالتزام','ميزانية الاستثمار','الرؤية المستقبلية'];
  const csv = [
    headers.join(','),
    ...rows.map(r => [
      r.timestamp, r.score+'/100', scoreLabel(r.score),
      r.fullName, r.email, r.phone, r.location,
      r.businessType === 'أخرى' ? r.businessTypeOther : r.businessType,
      r.experience, r.monthlyIncome, r.accountingSystem,
      r.profitMargin, r.developmentBudget, r.financialGoal,
      (r.challenges||[]).join(' | '), (r.barriers||[]).join(' | '),
      r.previousCoaching, r.weeklyTime, r.commitment,
      r.investmentBudget, r.futureVision
    ].map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(','))
  ].join('\n');

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `leads-premium-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ─── EMPTY FORM ──────────────────────────────────────────────────────────────
const emptyForm = {
  fullName:'', email:'', phone:'', location:'',
  businessType:'', businessTypeOther:'',
  experience:'', monthlyIncome:'',
  accountingSystem:'', profitMargin:'', developmentBudget:'',
  financialGoal:'',
  challenges:[], barriers:[],
  previousCoaching:'', weeklyTime:'',
  commitment:'', investmentBudget:'',
  futureVision:''
};

// ─── CHECKBOX GROUP ──────────────────────────────────────────────────────────
function CheckGroup({ name, options, selected, onChange, max }) {
  function toggle(val) {
    if (selected.includes(val)) {
      onChange(selected.filter(v => v !== val));
    } else if (!max || selected.length < max) {
      onChange([...selected, val]);
    }
  }
  return (
    <div className="options-grid">
      {options.map(opt => (
        <label key={opt} className={`option-item${selected.includes(opt) ? ' selected' : ''}`}>
          <input type="checkbox" checked={selected.includes(opt)} onChange={() => toggle(opt)} />
          {opt}
        </label>
      ))}
    </div>
  );
}

// ─── RADIO GROUP ─────────────────────────────────────────────────────────────
function RadioGroup({ name, options, value, onChange, cols }) {
  return (
    <div className={`options-grid${cols ? ' cols-'+cols : ''}`}>
      {options.map(opt => (
        <label key={opt} className={`option-item${value === opt ? ' selected' : ''}`}>
          <input type="radio" name={name} value={opt} checked={value === opt} onChange={() => onChange(opt)} />
          {opt}
        </label>
      ))}
    </div>
  );
}

// ─── ADMIN VIEW ───────────────────────────────────────────────────────────────
function AdminView({ leads, onBack }) {
  const [search, setSearch]   = useState('');
  const [filter, setFilter]   = useState('all');

  const visible = leads.filter(l => {
    const matchSearch = !search ||
      l.fullName.includes(search) ||
      l.email.toLowerCase().includes(search.toLowerCase()) ||
      l.phone.includes(search);
    const matchFilter = filter === 'all' ||
      (filter === 'high' && l.score >= 70) ||
      (filter === 'mid'  && l.score >= 50 && l.score < 70) ||
      (filter === 'low'  && l.score < 50);
    return matchSearch && matchFilter;
  });

  const total = leads.length;
  const high  = leads.filter(l => l.score >= 70).length;
  const mid   = leads.filter(l => l.score >= 50 && l.score < 70).length;
  const low   = leads.filter(l => l.score < 50).length;

  return (
    <div style={{ minHeight:'100vh', background:'#f5f0e8', padding:'20px' }}>
      {/* Header */}
      <div className="admin-bar">
        <div>
          <h1 style={{ fontSize:'1.7em', marginBottom:'6px' }}>👥 لوحة المتقدمات — Premium</h1>
          <p style={{ opacity:.8, fontSize:'.95em' }}>تتبع ومتابعة المتقدمات للبرنامج</p>
        </div>
        <button className="btn btn-outline" onClick={onBack}>← العودة للاستمارة</button>
      </div>

      {/* Stats */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))', gap:'16px', marginBottom:'20px' }}>
        {[
          { label:'إجمالي المتقدمات', val:total, emoji:'📋', bg:'#eee' },
          { label:'مرشحات ممتازة ✅', val:high,  emoji:'🟢', bg:'#e8f5e9', color:'#4a9d5f' },
          { label:'مرشحات متوسطة 🟡', val:mid,   emoji:'🟡', bg:'#fff8e1', color:'#c8900a' },
          { label:'غير مناسبة 🔴',   val:low,   emoji:'🔴', bg:'#fdecea', color:'#d64545' },
        ].map(s => (
          <div className="stat-card" key={s.label}>
            <div className="stat-icon" style={{ background:s.bg, color:s.color||'#555' }}>{s.emoji}</div>
            <div>
              <div style={{ fontSize:'.85em', color:'#888', marginBottom:'3px' }}>{s.label}</div>
              <div style={{ fontSize:'2em', fontWeight:800, color:s.color||'#1c1c1c' }}>{s.val}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Toolbar */}
      <div className="card" style={{ marginBottom:'18px', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'12px' }}>
        <div style={{ display:'flex', gap:'10px', flexWrap:'wrap', flex:1 }}>
          <input
            type="text" placeholder="🔍 ابحثي بالاسم أو الإيميل أو الهاتف..."
            value={search} onChange={e => setSearch(e.target.value)}
            style={{ padding:'10px 14px', border:'2px solid var(--border)', borderRadius:'10px', fontFamily:'Tajawal,sans-serif', fontSize:'.93em', minWidth:'240px', flex:1 }}
          />
          <select value={filter} onChange={e => setFilter(e.target.value)}
            style={{ padding:'10px 14px', border:'2px solid var(--border)', borderRadius:'10px', fontFamily:'Tajawal,sans-serif', fontSize:'.93em', cursor:'pointer' }}>
            <option value="all">كل المستويات</option>
            <option value="high">ممتازة (70+)</option>
            <option value="mid">متوسطة (50–69)</option>
            <option value="low">منخفضة (&lt;50)</option>
          </select>
        </div>
        <button className="btn btn-gold" onClick={() => exportCSV(visible)} disabled={visible.length === 0}
          style={{ opacity: visible.length === 0 ? .5 : 1 }}>
          ⬇️ تصدير CSV ({visible.length})
        </button>
      </div>

      {/* Leads */}
      {visible.length === 0 ? (
        <div className="card empty-state">
          <div className="icon">📋</div>
          <h3>{leads.length === 0 ? 'لا يوجد متقدمات بعد' : 'لا توجد نتائج'}</h3>
          <p style={{ fontSize:'.9em', marginTop:'8px' }}>{leads.length === 0 ? 'ستظهر الطلبات هنا فور تعبئة الاستمارة' : 'جربي تغيير كلمة البحث أو الفلتر'}</p>
        </div>
      ) : visible.map(l => (
        <div key={l.id} className={`lead-card ${scoreClass(l.score)}`}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:'12px', marginBottom:'16px' }}>
            <div>
              <h3 style={{ fontSize:'1.25em', marginBottom:'4px' }}>{l.fullName}</h3>
              <span style={{ fontSize:'.85em', color:'#888' }}>{l.timestamp}</span>
            </div>
            <div style={{ textAlign:'center', padding:'10px 18px', borderRadius:'10px',
              background: l.score>=70?'#e8f5e9':l.score>=50?'#fff8e1':'#fdecea' }}>
              <div style={{ fontSize:'1.8em', fontWeight:800,
                color: l.score>=70?'var(--green)':l.score>=50?'var(--orange)':'var(--red)' }}>{l.score}/100</div>
              <div style={{ fontSize:'.8em', fontWeight:700,
                color: l.score>=70?'var(--green)':l.score>=50?'var(--orange)':'var(--red)' }}>{scoreLabel(l.score)}</div>
            </div>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:'12px', marginBottom:'14px' }}>
            {[
              ['📧 إيميل', l.email],
              ['📱 هاتف',  l.phone],
              ['📍 موقع',  l.location],
              ['💼 نوع العمل', l.businessType === 'أخرى' ? l.businessTypeOther : l.businessType],
              ['💰 الدخل الشهري', l.monthlyIncome],
              ['💎 ميزانية الاستثمار', l.investmentBudget],
            ].map(([lbl, val]) => (
              <div key={lbl}>
                <div style={{ fontSize:'.8em', color:'#999', marginBottom:'2px' }}>{lbl}</div>
                <div style={{ fontWeight:600, fontSize:'.92em' }}>{val||'—'}</div>
              </div>
            ))}
          </div>

          {l.challenges?.length > 0 && (
            <div style={{ marginBottom:'10px' }}>
              <div style={{ fontSize:'.8em', color:'#999', marginBottom:'5px' }}>🎯 التحديات</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
                {l.challenges.map(c => (
                  <span key={c} style={{ background:'#f0e8df', color:'#8b6f4f', padding:'4px 10px', borderRadius:'20px', fontSize:'.82em', fontWeight:600 }}>{c}</span>
                ))}
              </div>
            </div>
          )}

          {l.futureVision && (
            <div style={{ background:'#f9f7f4', borderRadius:'10px', padding:'14px', borderRight:'4px solid var(--gold)' }}>
              <div style={{ fontSize:'.82em', color:'#888', marginBottom:'5px' }}>💬 الرؤية المستقبلية</div>
              <p style={{ fontSize:'.92em', lineHeight:1.7, color:'#333' }}>{l.futureVision}</p>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── FORM VIEW ────────────────────────────────────────────────────────────────
function FormView({ onSubmit, onAdmin }) {
  const [d, setD] = useState(emptyForm);
  const [disqualified, setDisqualified] = useState(false);
  const [errors, setErrors] = useState({});

  function set(field, val) {
    setD(prev => ({ ...prev, [field]: val }));
    if (field === 'investmentBudget') setDisqualified(val === 'أقل من 7,000 ₪');
  }

  // Progress
  const total = 19;
  const filled = Object.entries(d).filter(([k,v]) =>
    k === 'businessTypeOther' ? false :
    Array.isArray(v) ? v.length > 0 : !!v
  ).length;
  const progress = Math.round((filled / total) * 100);

  function validate() {
    const e = {};
    if (!d.fullName.trim()) e.fullName = 'مطلوب';
    if (!d.email.includes('@')) e.email = 'إيميل غير صحيح';
    if (!d.phone.trim()) e.phone = 'مطلوب';
    if (!d.businessType) e.businessType = 'مطلوب';
    if (!d.experience) e.experience = 'مطلوب';
    if (!d.monthlyIncome) e.monthlyIncome = 'مطلوب';
    if (d.challenges.length === 0) e.challenges = 'اختاري تحدياً واحداً على الأقل';
    if (d.challenges.length > 3)   e.challenges = 'الحد الأقصى 3 تحديات';
    if (!d.investmentBudget) e.investmentBudget = 'مطلوب';
    if (!d.commitment) e.commitment = 'مطلوب';
    return e;
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (disqualified) return;
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); window.scrollTo({top:0,behavior:'smooth'}); return; }
    const score = calcScore(d);
    onSubmit({ ...d, score, timestamp: new Date().toLocaleString('ar-IL'), id: Date.now() });
  }

  const errStyle = { color:'var(--red)', fontSize:'.82em', marginTop:'4px' };

  return (
    <div style={{ minHeight:'100vh', background:'#f5f0e8', padding:'20px' }}>
      <div style={{ maxWidth:'780px', margin:'0 auto' }}>

        {/* Header */}
        <div style={{ background:'linear-gradient(135deg,#b8926a,#8b6f4f)', borderRadius:'20px', padding:'38px 36px', textAlign:'center', color:'#fff', marginBottom:'20px', boxShadow:'0 12px 40px rgba(184,146,106,.3)' }}>
          <div style={{ fontSize:'2.5em', marginBottom:'10px' }}>🎯</div>
          <h1 style={{ fontSize:'1.9em', fontWeight:900, marginBottom:'10px' }}>استمارة القبول — برنامج Premium</h1>
          <p style={{ opacity:.9, fontSize:'1.05em', lineHeight:1.7 }}>هذه الاستمارة تساعدنا على فهم وضعك بشكل دقيق وتحديد إذا كنتِ مرشحة مناسبة للمرافقة الشخصية</p>
        </div>

        {/* Admin button */}
        <div style={{ textAlign:'left', marginBottom:'16px' }}>
          <button className="btn btn-dark" style={{ fontSize:'.88em', padding:'9px 18px' }} onClick={onAdmin}>
            👥 لوحة المتقدمات
          </button>
        </div>

        {/* Progress */}
        <div style={{ marginBottom:'20px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:'.85em', color:'#888', marginBottom:'6px' }}>
            <span>اكتمال الاستمارة</span><span>{progress}%</span>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{ width:progress+'%' }}/></div>
        </div>

        <form onSubmit={handleSubmit} noValidate>
          {/* ── SECTION 1: Personal ── */}
          <div className="card" style={{ marginBottom:'18px' }}>
            <div className="section-title">👤 المعلومات الشخصية</div>

            <div className="field-row">
              <div className="field">
                <label>الاسم الكامل *</label>
                <input type="text" placeholder="الاسم واللقب" value={d.fullName} onChange={e => set('fullName', e.target.value)} />
                {errors.fullName && <div style={errStyle}>{errors.fullName}</div>}
              </div>
              <div className="field">
                <label>رقم الهاتف (واتساب) *</label>
                <input type="tel" placeholder="05X-XXXXXXX" value={d.phone} onChange={e => set('phone', e.target.value)} />
                {errors.phone && <div style={errStyle}>{errors.phone}</div>}
              </div>
            </div>

            <div className="field-row">
              <div className="field">
                <label>البريد الإلكتروني *</label>
                <input type="email" placeholder="example@email.com" value={d.email} onChange={e => set('email', e.target.value)} />
                {errors.email && <div style={errStyle}>{errors.email}</div>}
              </div>
              <div className="field">
                <label>المدينة / المنطقة</label>
                <input type="text" placeholder="حيفا، تل أبيب، ناصرة..." value={d.location} onChange={e => set('location', e.target.value)} />
              </div>
            </div>
          </div>

          {/* ── SECTION 2: Business ── */}
          <div className="card" style={{ marginBottom:'18px' }}>
            <div className="section-title">💼 معلومات العمل</div>

            <div className="field">
              <label>نوع عملك / خدمتك *</label>
              <RadioGroup name="businessType" value={d.businessType} onChange={v => set('businessType', v)} cols={2}
                options={['استشارات وتدريب أعمال','صالون تجميل / مركز رعاية','مدرب / مدربة (كوتش)','خدمات رقمية وسوشيال ميديا','تصميم وإبداع','خدمات صحية وعلاجية','أخرى']}
              />
              {errors.businessType && <div style={errStyle}>{errors.businessType}</div>}
            </div>

            {d.businessType === 'أخرى' && (
              <div className="field">
                <label>اذكري نوع عملك</label>
                <input type="text" placeholder="صفي عملك..." value={d.businessTypeOther} onChange={e => set('businessTypeOther', e.target.value)} />
              </div>
            )}

            <div className="field">
              <label>كم سنة من الخبرة في هذا المجال؟ *</label>
              <RadioGroup name="experience" value={d.experience} onChange={v => set('experience', v)} cols={2}
                options={['أقل من 6 أشهر','6 أشهر – سنة','1–3 سنوات','أكثر من 3 سنوات']}
              />
              {errors.experience && <div style={errStyle}>{errors.experience}</div>}
            </div>

            <div className="field">
              <label>ما هو دخلك الشهري الحالي من العمل؟ *</label>
              <RadioGroup name="monthlyIncome" value={d.monthlyIncome} onChange={v => set('monthlyIncome', v)} cols={2}
                options={['أقل من 7,000 ₪','7,000–15,000 ₪','15,000–30,000 ₪','30,000–50,000 ₪','أكثر من 50,000 ₪']}
              />
              {errors.monthlyIncome && <div style={errStyle}>{errors.monthlyIncome}</div>}
            </div>
          </div>

          {/* ── SECTION 3: Financial ── */}
          <div className="card" style={{ marginBottom:'18px' }}>
            <div className="section-title">📊 الوضع المالي</div>

            <div className="field">
              <label>هل عندك نظام محاسبة أو متابعة مالية؟</label>
              <RadioGroup name="accountingSystem" value={d.accountingSystem} onChange={v => set('accountingSystem', v)} cols={2}
                options={['نعم، نظام منتظم','أساسي وبسيط','لا، أعتمد على التقدير','لا أتابع أرقامي']}
              />
            </div>

            <div className="field">
              <label>هل تعرفين هامش ربحك الصافي تقريباً؟</label>
              <RadioGroup name="profitMargin" value={d.profitMargin} onChange={v => set('profitMargin', v)} cols={3}
                options={['نعم بدقة','تقريباً','لا أعرف']}
              />
            </div>

            <div className="field">
              <label>كم تنفقين شهرياً على تطوير عملك (تسويق، أدوات، تعلم)؟</label>
              <select value={d.developmentBudget} onChange={e => set('developmentBudget', e.target.value)}>
                <option value="">اختاري...</option>
                {['لا شيء حالياً','أقل من 500 ₪','500 – 2,000 ₪','2,000 – 5,000 ₪','أكثر من 5,000 ₪'].map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            </div>

            <div className="field">
              <label>ما هو هدفك المالي خلال 6 أشهر؟</label>
              <input type="text" placeholder="مثال: الوصول لـ 40,000 ₪ شهرياً بثبات" value={d.financialGoal} onChange={e => set('financialGoal', e.target.value)} />
            </div>
          </div>

          {/* ── SECTION 4: Challenges ── */}
          <div className="card" style={{ marginBottom:'18px' }}>
            <div className="section-title">🎯 التحديات والعوائق</div>

            <div className="field">
              <label>ما هي أكبر تحدياتك في عملك الآن؟ (اختاري 1–3) *</label>
              <CheckGroup name="challenges" selected={d.challenges} max={3}
                onChange={v => set('challenges', v)}
                options={[
                  'دخل غير ثابت وغير متوقع',
                  'ربح منخفض رغم الدخل',
                  'صعوبة في جذب عملاء جدد',
                  'عملاء يساومون على السعر',
                  'لا وقت كافٍ لتطوير العمل',
                  'لا أعرف كيف أرفع أسعاري',
                  'التسويق والحضور الرقمي',
                  'إدارة الوقت والأولويات',
                ]}
              />
              {errors.challenges && <div style={errStyle}>{errors.challenges}</div>}
            </div>

            <div className="field">
              <label>ما العوائق التي منعتك حتى الآن من الوصول لأهدافك؟ (اختاري كل ما ينطبق)</label>
              <CheckGroup name="barriers" selected={d.barriers}
                onChange={v => set('barriers', v)}
                options={[
                  'عدم وضوح الخطة والاستراتيجية',
                  'خوف من رفع الأسعار',
                  'ضغط الحياة اليومية',
                  'لم أجد الدعم والتوجيه المناسب',
                  'جربت أدوات كثيرة بدون نتيجة',
                  'صعوبة في الالتزام',
                ]}
              />
            </div>

            <div className="field">
              <label>هل سبق أن عملتِ مع مدرب أو مستشار أعمال؟</label>
              <RadioGroup name="previousCoaching" value={d.previousCoaching} onChange={v => set('previousCoaching', v)} cols={3}
                options={['نعم، وكانت تجربة إيجابية','نعم، لكن لم تكن التجربة جيدة','لا، هذه المرة الأولى']}
              />
            </div>
          </div>

          {/* ── SECTION 5: Readiness ── */}
          <div className="card" style={{ marginBottom:'18px' }}>
            <div className="section-title">🚀 مدى الجاهزية</div>

            <div className="field">
              <label>كم ساعة أسبوعياً تستطيعين تخصيصها للعمل على تطوير عملك؟</label>
              <RadioGroup name="weeklyTime" value={d.weeklyTime} onChange={v => set('weeklyTime', v)} cols={2}
                options={['أقل من 3 ساعات','3–5 ساعات','5–10 ساعات','أكثر من 10 ساعات']}
              />
            </div>

            <div className="field">
              <label>ما مستوى التزامك إذا انضممتِ للبرنامج؟ *</label>
              <RadioGroup name="commitment" value={d.commitment} onChange={v => set('commitment', v)}
                options={[
                  'جاهزة 100% للاستثمار والالتزام',
                  'مستعدة لكن أحتاج بعض التهيئة',
                  'لا زلت في مرحلة الاستكشاف',
                  'أبحث عن حل مجاني أو رخيص',
                ]}
              />
              {errors.commitment && <div style={errStyle}>{errors.commitment}</div>}
            </div>

            <div className="field">
              <label>ما الميزانية التي تستطيعين تخصيصها للاستثمار في تطوير عملك؟ *</label>
              <RadioGroup name="investmentBudget" value={d.investmentBudget} onChange={v => set('investmentBudget', v)}
                options={[
                  'أقل من 7,000 ₪',
                  '7,000–12,000 ₪',
                  '12,000–20,000 ₪',
                  'أكثر من 20,000 ₪',
                  'أريد أن أفهم القيمة أولاً',
                ]}
              />
              {errors.investmentBudget && <div style={errStyle}>{errors.investmentBudget}</div>}
            </div>

            {disqualified && (
              <div className="disqualified-box">
                <div style={{ fontSize:'2em', marginBottom:'10px' }}>😔</div>
                <h3 style={{ color:'var(--red)', marginBottom:'10px' }}>شكراً لاهتمامك</h3>
                <p style={{ fontSize:'.95em', lineHeight:1.7, color:'#555' }}>
                  للأسف برنامج Premium يتطلب ميزانية أعلى من ذلك.<br/>
                  يسعدنا مساعدتك عبر <strong>جلسة Focus</strong> كخطوة أولى — <a href="https://rimayaqub.ravpage.co.il/focus" style={{ color:'var(--gold)' }}>احجزي هنا</a>
                </p>
              </div>
            )}
          </div>

          {/* ── SECTION 6: Vision ── */}
          {!disqualified && (
            <div className="card" style={{ marginBottom:'24px' }}>
              <div className="section-title">💬 رؤيتك المستقبلية</div>
              <div className="field">
                <label>صفي لنا: كيف يبدو عملك المثالي بعد 6 أشهر من المرافقة؟</label>
                <textarea placeholder="اكتبي بحرية... الدخل، نوع العملاء، ساعات العمل، شعورك تجاه العمل..." value={d.futureVision} onChange={e => set('futureVision', e.target.value)} style={{ minHeight:'110px' }} />
              </div>
            </div>
          )}

          {!disqualified && (
            <button type="submit" className="btn btn-gold" style={{ width:'100%', justifyContent:'center', fontSize:'1.1em', padding:'16px', borderRadius:'14px', marginBottom:'30px' }}>
              📩 إرسال الاستمارة ←
            </button>
          )}
        </form>
      </div>
    </div>
  );
}

// ─── SUCCESS ─────────────────────────────────────────────────────────────────
function SuccessScreen({ score, onAdmin }) {
  return (
    <div className="success-screen" style={{ background:'linear-gradient(135deg,#f9f7f4,#ede8e1)' }}>
      <div style={{ maxWidth:'560px', background:'#fff', borderRadius:'20px', padding:'60px 40px', textAlign:'center', boxShadow:'0 20px 60px rgba(184,146,106,.2)' }}>
        <div style={{ fontSize:'4em', marginBottom:'20px' }}>✅</div>
        <h2 style={{ fontSize:'1.8em', marginBottom:'16px' }}>شكراً! وصلتنا استمارتك</h2>
        <p style={{ color:'#666', lineHeight:1.8, marginBottom:'10px' }}>
          ريما ستراجع طلبك خلال 24 ساعة وستتواصل معك على الواتساب.
        </p>
        <div style={{ display:'inline-block', padding:'12px 24px', borderRadius:'12px', margin:'16px 0',
          background: score>=70?'#e8f5e9':score>=50?'#fff8e1':'#fdecea',
          color: score>=70?'var(--green)':score>=50?'var(--orange)':'var(--red)', fontWeight:700 }}>
          نتيجتك: {score}/100 — {scoreLabel(score)}
        </div>
        <br/>
        <button className="btn btn-dark" onClick={onAdmin} style={{ marginTop:'16px' }}>
          👥 عرض لوحة المتقدمات
        </button>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView]   = useState('form');    // 'form' | 'admin' | 'success'
  const [leads, setLeads] = useState([]);
  const [lastScore, setLastScore] = useState(0);

  useEffect(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) setLeads(JSON.parse(s)); } catch {}
  }, []);

  function saveLead(lead) {
    const updated = [lead, ...leads];
    setLeads(updated);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(updated)); } catch {}
    setLastScore(lead.score);
    setView('success');
  }

  if (view === 'admin')   return <AdminView leads={leads} onBack={() => setView('form')} />;
  if (view === 'success') return <SuccessScreen score={lastScore} onAdmin={() => setView('admin')} />;
  return <FormView onSubmit={saveLead} onAdmin={() => setView('admin')} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
